name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gates:
    name: Typecheck · Tests · Build · Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests
        run: npx vitest run

      - name: Build
        run: npm run build

      - name: Lint
        run: npx eslint .
