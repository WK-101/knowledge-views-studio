<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Capture to Knowledge Views</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="popup">
    <header>
      <strong>Capture</strong>
      <button id="settings" class="link" type="button">Settings</button>
    </header>
    <div id="status" class="status">Reading this page…</div>

    </div>
    <script src="popup.js"></script>
  </body>
</html>
