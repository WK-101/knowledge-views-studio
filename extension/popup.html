<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Capture</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <strong>Knowledge Views</strong>
      <button id="settings" class="link" type="button">Settings</button>
    </header>
    <nav class="tabs">
      <button data-tab="capture" class="tab active" type="button">Capture</button>
      <button data-tab="rows" class="tab hidden" type="button">Rows</button>
      <button data-tab="note" class="tab hidden" type="button">Whole page</button>
      <button data-tab="edit" class="tab hidden" type="button">Update</button>
      <button data-tab="annotate" class="tab hidden" type="button">Highlight</button>
      <button data-tab="search" class="tab" type="button">Search</button>
    </nav>
    <div id="status" class="status">Reading this page…</div>
    <main id="panels">
      <div id="tab-capture" class="panel">
        <div id="app"></div>
        <div id="destination" class="dest-row hidden">
          <select id="view" title="Which view this page goes to"></select>
          <button id="addRow" class="dest-btn" type="button" title="Add this page as a row in the view">+ Row</button>
          <button id="addPage" class="dest-btn" type="button" title="Save this page as a note">+ Page</button>
        </div>
        <div id="controls" class="hidden">
          <div id="form"></div>
          <button id="save" class="primary" type="button">Save to vault</button>
        </div>
      </div>
      <div id="tab-rows" class="panel hidden"></div>
      <div id="tab-note" class="panel hidden"></div>
      <div id="tab-edit" class="panel hidden"></div>
      <div id="tab-annotate" class="panel hidden"></div>
      <div id="tab-search" class="panel hidden"></div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
